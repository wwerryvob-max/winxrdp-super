name: RDP (Bore Stable + Apps + Discord + OBS + Captura)

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Core RDP Settings
        run: |
          # --- AUDIO & SESSION FIXES ---
          Set-Service -Name Audiosrv -StartupType Automatic
          sc failure Audiosrv reset=86400 actions=restart/5000/restart/10000/restart/30000
          Start-Service -Name Audiosrv
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableAudioCapture" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxDisconnectionTime" -Value 0 -Force

          # Enable clipboard sharing
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableClip" -Value 0 -Force

          # Enable Remote Desktop (disable NLA for log-based interaction)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force

          # Enable auto-reconnect on disconnect
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fEnableAutoReconnect" -Value 1 -Force

          # Firewall
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389

          # Auto-restart RDP service if it crashes
          sc failure TermService reset=86400 actions=restart/5000/restart/10000/restart/30000

          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        env:
          MY_SECRET_PASS: ${{ secrets.PASS }}
        run: |
          if (-not $env:MY_SECRET_PASS) {
              Write-Error "Secret 'PASS' is missing. Add it in Repository Settings."
              exit 1
          }
          $securePass = ConvertTo-SecureString $env:MY_SECRET_PASS -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_CREDS=User: RDP | Password: (Hidden)" >> $env:GITHUB_ENV

      - name: Optimize System
        run: |
          # High Performance power plan
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

          # Disable Windows Automatic Updates
          New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" -Force | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" -Name "NoAutoUpdate" -Value 1 -Type DWord -Force

          # Remove bloatware (preinstalled UWP apps)
          $bloat = @(
              '*xbox*', '*bing*', '*skype*', '*officehub*', '*zune*',
              '*candycrush*', '*solitaire*', '*spotify*', '*netflix*',
              '*disney*', '*tiktok*', '*facebook*', '*instagram*',
              '*twitter*', '*pinterest*', '*minecraft*'
          )
          Get-AppxPackage -AllUsers | Where-Object {
              $name = $_.Name
              [bool]($bloat | Where-Object { $name -like $_ })
          } | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue

          Write-Host "System optimization complete."

      - name: Install Apps
        run: |
          Write-Host "Installing Apps..."
          
          # Install audio driver for screen recording
          choco install vb-cable -y --no-progress --ignore-checksums --ignore-package-exit-codes
          
          # Bulk install (Choco handles locking internally — faster than sequential)
          choco install googlechrome brave discord obs-studio ffmpeg captura vlc `
            -y --no-progress --ignore-checksums --ignore-package-exit-codes
          
          # --- Fix Brave to Public ---
          $BraveAdmin = "C:\Users\runneradmin\AppData\Local\BraveSoftware"
          if (Test-Path $BraveAdmin) {
              Copy-Item -Path $BraveAdmin -Destination "C:\" -Recurse -Force
          }
          
          # --- Fix Discord to Public ---
          $DiscordAdmin = "C:\Users\runneradmin\AppData\Local\Discord"
          if (Test-Path $DiscordAdmin) {
              Copy-Item -Path $DiscordAdmin -Destination "C:\" -Recurse -Force
          }
          
          # --- Fix Captura ---
          $CapLoc1 = "C:\Users\runneradmin\AppData\Local\Captura"
          $CapLoc2 = "C:\ProgramData\chocolatey\lib\captura\tools"
          if (Test-Path $CapLoc1) {
              Copy-Item -Path $CapLoc1 -Destination "C:\" -Recurse -Force
              Rename-Item -Path "C:\Captura" -NewName "Captura_App" -ErrorAction SilentlyContinue
              Rename-Item -Path "C:\Captura_App" -NewName "Captura"
          } elseif (Test-Path $CapLoc2) {
              Copy-Item -Path $CapLoc2 -Destination "C:\Captura" -Recurse -Force
          }
          
          # --- Desktop Shortcuts ---
          $WshShell = New-Object -comObject WScript.Shell
          
          $BraveLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Brave.lnk")
          $BraveLnk.TargetPath = "C:\BraveSoftware\Brave-Browser\Application\brave.exe"
          $BraveLnk.Save()
          
          $DiscordExe = Get-ChildItem -Path "C:\Discord" -Recurse -Filter "Discord.exe" | Select-Object -First 1
          if ($DiscordExe) {
              $DiscordLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Discord.lnk")
              $DiscordLnk.TargetPath = $DiscordExe.FullName
              $DiscordLnk.Save()
          }
          
          $OBSLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\OBS Studio.lnk")
          $OBSLnk.TargetPath = "C:\Program Files\obs-studio\bin\64bit\obs64.exe"
          $OBSLnk.WorkingDirectory = "C:\Program Files\obs-studio\bin\64bit"
          $OBSLnk.Save()
          
          $CapturaLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Captura.lnk")
          $CapturaLnk.TargetPath = "C:\Captura\Captura.exe"
          $CapturaLnk.WorkingDirectory = "C:\Captura"
          $CapturaLnk.Save()
          
          # --- Pre-made OBS Profile (720p, 30fps, ready to use) ---
          $OBSProfDir = "$env:APPDATA\obs-studio\basic\profiles\RDP_Optimized"
          New-Item -ItemType Directory -Path $OBSProfDir -Force | Out-Null
          @"
          [General]
          Name=RDP_Optimized
          [Video]
          BaseCX=1280
          BaseCY=720
          OutputCX=1280
          OutputCY=720
          FPSType=Common
          FPSCommon=30
          ScaleType=bicubic
          [Output]
          Mode=Simple
          RecType=Standard
          RecFmt=mp4
          RecEncoder=amd
          RecQuality=Small
          RecRB=2500
          AudioBitrate=128
          [AdvOut]
          RecTrack1=1
          RecTrack2=2
          "@ | Set-Content -Path "$OBSProfDir\basic.ini" -Encoding ASCII
          
          Write-Host "Installs, Shortcuts & OBS Profile Complete."

      - name: Create Website Shortcuts
        run: |
          $braveExe = "C:\BraveSoftware\Brave-Browser\Application\brave.exe"
          $desktop = "C:\Users\Public\Desktop"
          $sites = @(
              @{Name="Cinevo"; Url="https://cinevo.site"},
              @{Name="StreamEx"; Url="https://streamex.sh"},
              @{Name="Mappl TV"; Url="https://mappl.tv/"},
              @{Name="7Reels"; Url="https://7reels.cc/"},
              @{Name="SkyFlixer"; Url="https://skyflixer.fun/"},
              @{Name="1Flex"; Url="https://1flex.org"},
              @{Name="RedFlix"; Url="https://redflix.co/"},
              @{Name="Cinezo"; Url="https://cinezo.net/"},
              @{Name="Discord"; Url="https://discord.com/app"}
          )
          $WshShell = New-Object -comObject WScript.Shell
          foreach ($site in $sites) {
              $lnk = $WshShell.CreateShortcut("$desktop\$($site.Name).lnk")
              $lnk.TargetPath = $braveExe
              $lnk.Arguments = $site.Url
              $lnk.Save()
          }
          Write-Host "Website shortcuts created on Public Desktop."

      - name: Start Bore & Maintain Connection
        run: |
          # --- Download & prepare bore ---
          $boreDir = "$env:TEMP\bore"
          $boreZip = "$env:TEMP\bore.zip"
          $boreUrl = "https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-pc-windows-msvc.zip"
          
          Invoke-WebRequest -Uri $boreUrl -OutFile $boreZip -UseBasicParsing
          Expand-Archive $boreZip -DestinationPath $boreDir -Force
          Remove-Item $boreZip -Force
          $boreExe = "$boreDir\bore.exe"
          
          # --- Helper: wait for bore address ---
          function Get-BoreAddress($logFile, $timeoutSec = 90) {
              $start = Get-Date
              while ((Get-Date) - $start -lt [TimeSpan]::FromSeconds($timeoutSec)) {
                  if (Test-Path $logFile) {
                      $m = (Get-Content $logFile -Tail 20) | Select-String 'listening at (bore\.pub:\d+)'
                      if ($m) { return $m.Matches.Groups[1].Value }
                  }
                  Start-Sleep -Seconds 1
              }
              return $null
          }
          
          # --- Main retry loop with auto-restart ---
          $maxRetries = 5
          $delay = 10
          
          for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
              Write-Host "`n=== Bore attempt $attempt/$maxRetries ==="
              $logFile = "$env:TEMP\bore_$attempt.log"
              
              $proc = Start-Process -FilePath $boreExe -ArgumentList "local 3389 --to bore.pub" `
                  -NoNewWindow -RedirectStandardOutput $logFile -PassThru
              
              $address = Get-BoreAddress -logFile $logFile -timeoutSec 90
              
              if ($address) {
                  Write-Host "`n=== RDP ACCESS ==="
                  Write-Host "Address: $address"
                  Write-Host "Username: RDP"
                  Write-Host "==================`n"
                  $delay = 10  # reset backoff
                  
                  # Watchdog: keep bore alive, restart if it crashes
                  while ($true) {
                      Start-Sleep -Seconds 30
                      if ($proc.HasExited) {
                          Write-Host "Bore exited (code $($proc.ExitCode)). Restarting..."
                          break
                      }
                      Write-Host "[$(Get-Date -Format 'HH:mm:ss')] RDP Active"
                  }
              } else {
                  Write-Warning "Failed to get address (attempt $attempt)"
                  if ($proc -and !$proc.HasExited) { $proc.Kill() }
                  Write-Host "Retrying in ${delay}s..."
                  Start-Sleep -Seconds $delay
                  $delay = [Math]::Min($delay * 2, 120)  # exponential backoff
              }
          }
          
          Write-Error "All $maxRetries attempts failed."

      # 9. Auto-Restart Workflow
      - name: 🔄 Auto-Restart Server
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering next workflow run to restart the server..."
          gh workflow run main.yml --ref ${{ github.ref_name }}
