name: Linux RDP (XFCE + Cloudflare + Firefox)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  ubuntu-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install XFCE Desktop, Firefox & XRDP
        run: |
          echo "Updating system..."
          sudo apt update
          
          # THE TRICK: Add the official Mozilla Team repository
          sudo apt install software-properties-common -y
          sudo add-apt-repository ppa:mozillateam/ppa -y
          sudo apt update
          
          # Install the desktop environment and native Firefox ESR
          echo "Installing XFCE and native Firefox ESR..."
          sudo DEBIAN_FRONTEND=noninteractive apt install xfce4 xfce4-goodies xrdp dbus-x11 firefox-esr -y
          
          # Enable XRDP service
          sudo adduser xrdp ssl-cert
          sudo systemctl enable --now xrdp
          
          echo "Applying Firefox Sandbox Fix..."
          sudo sed -i 's/^Exec=firefox-esr.*/Exec=firefox-esr --no-sandbox --disable-seccomp/' /usr/share/applications/firefox-esr.desktop

      - name: Create RDP User & Patch XRDP Startup
        env:
          MY_SECRET_PASS: ${{ secrets.PASS }}
        run: |
          if [ -z "$MY_SECRET_PASS" ]; then
              echo "Error: Secret 'PASS' is empty. Please add it in Repository Settings."
              exit 1
          fi
          
          echo "Creating RDP user..."
          sudo useradd -m -s /bin/bash RDP
          echo "RDP:$MY_SECRET_PASS" | sudo chpasswd
          sudo usermod -aG sudo RDP
          
          echo "Patching the global XRDP script..."
          # Tell the global script to launch startxfce4
          sudo sed -i.bak '/fi/a #xrdp multiple users fix \n startxfce4 \n' /etc/xrdp/startwm.sh
          
          # Comment out the default Ubuntu session execution at the bottom of the script
          sudo sed -i 's/^test -x \/etc\/X11\/Xsession/#test -x \/etc\/X11\/Xsession/' /etc/xrdp/startwm.sh
          sudo sed -i 's/^exec \/bin\/sh \/etc\/X11\/Xsession/#exec \/bin\/sh \/etc\/X11\/Xsession/' /etc/xrdp/startwm.sh
          
          echo "Creating local user configuration..."
          echo "startxfce4" | sudo tee /home/RDP/.Xclients
          sudo chown RDP:RDP /home/RDP/.Xclients
          sudo chmod +x /home/RDP/.Xclients
          
          echo "Restarting XRDP service..."
          sudo systemctl restart xrdp

      - name: Start Cloudflare Tunnel & Maintain Connection
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
              echo "Error: Secret 'CF_TOKEN' is missing."
              exit 1
          fi

          echo "Downloading Cloudflared for Linux..."
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          echo "Installing and Starting Cloudflare Tunnel as a service..."
          sudo cloudflared service install $CF_TOKEN
          
          export CF_TOKEN=""
          history -c
          
          echo -e "\n=== RDP ACCESS ==="
          echo "Username: RDP"
          echo "Password: (Hidden - Check your Secrets)"
          echo "Connect via the public hostname you configured in your Cloudflare Zero Trust dashboard."
          echo -e "==================\n"
          
          # Timer setup: Run for exactly 345 minutes
          END_TIME=$(($(date +%s) + 20700)) 
          
          while [ $(date +%s) -lt $END_TIME ]; do
              echo "[$(date)] Linux RDP Active via Cloudflare - Cancel workflow to terminate early"
              sleep 300
          done
          
          echo "Time limit reached (5 hours 45 mins). Proceeding to auto-restart..."

      - name: 🔄 Auto-Restart Server
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering next workflow run to restart the server..."
          gh workflow run rdp_workflow.yml --repo ${{ github.repository }} --ref ${{ github.ref_name }}
          echo "✅ Restart triggered successfully!"
