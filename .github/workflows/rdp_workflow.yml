name: Windows RDP (Cloudflare + Apps + Cloud Backup)

on:
  workflow_dispatch:

# REQUIRED: Grants the GitHub token permission to trigger the next workflow run
permissions:
  actions: write
  contents: read

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          # --- SET TIMEZONE TO IST ---
          Set-TimeZone -Id "India Standard Time"

          # --- AUDIO & SESSION FIXES START HERE ---
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableAudioCapture" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxDisconnectionTime" -Value 0 -Force
          # --- FIXES END HERE ---

          # Enable Remote Desktop and disable Network Level Authentication
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          # Remove existing rule, then allow incoming RDP connections
          netsh advfirewall firewall delete rule name="RDP-Tunnel"
          netsh advfirewall firewall add rule name="RDP-Tunnel" `
            dir=in action=allow protocol=TCP localport=3389

          # Restart Remote Desktop service
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        env:
          MY_SECRET_PASS: ${{ secrets.PASS }}
        run: |
          if (-not $env:MY_SECRET_PASS) {
              Write-Error "Error: Secret 'PASS' is empty or missing. Please add it in Repository Settings."
              exit 1
          }

          $password = $env:MY_SECRET_PASS
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          
          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Apps & Fix Shortcuts
        run: |
          Write-Host "Installing Apps..."
          
          # 1. Install via Chocolatey
          choco install vb-cable -y --no-progress --ignore-checksums
          choco install winrar -y --no-progress
          choco install googlechrome -y --no-progress --ignore-checksums
          choco install brave -y --no-progress
          choco install ffmpeg -y --no-progress
          choco install captura -y --no-progress
          
          # 2. FIX BRAVE: Move to Public Folder
          $BraveAdmin = "C:\Users\runneradmin\AppData\Local\BraveSoftware"
          if (Test-Path $BraveAdmin) {
              Copy-Item -Path $BraveAdmin -Destination "C:\" -Recurse -Force
          }
          
          # 3. FIX CAPTURA: Find and Move to Public Folder
          $CapLoc1 = "C:\Users\runneradmin\AppData\Local\Captura"
          $CapLoc2 = "C:\ProgramData\chocolatey\lib\captura\tools"
          
          if (Test-Path $CapLoc1) {
              Copy-Item -Path $CapLoc1 -Destination "C:\" -Recurse -Force
              Rename-Item -Path "C:\Captura" -NewName "Captura_App" -ErrorAction SilentlyContinue
              Rename-Item -Path "C:\Captura_App" -NewName "Captura"
          }
          elseif (Test-Path $CapLoc2) {
              Copy-Item -Path $CapLoc2 -Destination "C:\Captura" -Recurse -Force
          }
          
          # 4. Create Desktop Shortcuts
          $WshShell = New-Object -comObject WScript.Shell
          
          # Brave
          $BraveLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Brave.lnk")
          $BraveLnk.TargetPath = "C:\BraveSoftware\Brave-Browser\Application\brave.exe"
          $BraveLnk.Save()
          
          # Captura
          $CapturaLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Captura.lnk")
          $CapturaLnk.TargetPath = "C:\Captura\Captura.exe"
          $CapturaLnk.WorkingDirectory = "C:\Captura"
          $CapturaLnk.Save()

          # WinRAR
          $RarLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\WinRAR.lnk")
          if (Test-Path "C:\Program Files\WinRAR\WinRAR.exe") {
              $RarLnk.TargetPath = "C:\Program Files\WinRAR\WinRAR.exe"
          } else {
              $RarLnk.TargetPath = "C:\Program Files (x86)\WinRAR\WinRAR.exe"
          }
          $RarLnk.Save()

          # 5. Create Auto-Wallpaper Script and Background Snipping Tool Fix
          Write-Host "Setting up Auto-Wallpaper restore and Snipping Tool monitor..."
          $WallCode = @'
          $imgPath = "C:\Users\Public\Desktop\SavedFiles\MyWallpaper.jpg"
          if (Test-Path $imgPath) {
              Add-Type -TypeDefinition "using System; using System.Runtime.InteropServices; public class W { [DllImport(""user32.dll"")] public static extern int SystemParametersInfo(int a, int b, string c, int d); }"
              [W]::SystemParametersInfo(20, 0, $imgPath, 3)
          }
          
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          Add-Type -TypeDefinition "using System; using System.Runtime.InteropServices; public class Clip { [DllImport(""user32.dll"")] public static extern uint GetClipboardSequenceNumber(); }"
          
          $ScreenshotDir = "$env:USERPROFILE\Pictures\Screenshots"
          $lastSeq = [Clip]::GetClipboardSequenceNumber()
          $lastSaveTime = [DateTime]::MinValue
          
          while ($true) {
              Start-Sleep -Milliseconds 500
              $seq = [Clip]::GetClipboardSequenceNumber()
              if ($seq -ne $lastSeq) {
                  $lastSeq = $seq
                  if ([System.Windows.Forms.Clipboard]::ContainsImage()) {
                      if ((Get-Date) - $lastSaveTime -gt [TimeSpan]::FromSeconds(2)) {
                          $lastSaveTime = Get-Date
                          try {
                              $img = [System.Windows.Forms.Clipboard]::GetImage()
                              if ($img) {
                                  $timestamp = (Get-Date).ToString("yyyy-MM-dd HH_mm_ss")
                                  $savePath = Join-Path $ScreenshotDir "Screenshot $timestamp.png"
                                  $img.Save($savePath, [System.Drawing.Imaging.ImageFormat]::Png)
                                  $img.Dispose()
                              }
                          } catch {}
                      }
                  }
              }
          }
          '@
          $WallCode | Out-File "C:\Users\Public\SetWallpaper.ps1" -Encoding utf8
          
          # 6. Apply Default User Registry Settings (Dark Mode, Screenshots Folder)
          Write-Host "Applying Default User Registry Settings..."
          reg load "HKU\DefaultUser" "C:\Users\Default\NTUSER.DAT" | Out-Null
          Set-ItemProperty -Path "HKU:\DefaultUser\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "AppsUseLightTheme" -Value 0 -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKU:\DefaultUser\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "SystemUsesLightTheme" -Value 0 -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKU:\DefaultUser\Control Panel\Desktop" -Name "JPEGImportQuality" -Value 100 -Type DWord -Force -ErrorAction SilentlyContinue
          
          New-Item -ItemType Directory -Force -Path "C:\Users\Default\Pictures\Screenshots" -ErrorAction SilentlyContinue | Out-Null
          Set-ItemProperty -Path "HKU:\DefaultUser\Software\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders" -Name "{B7BEDE81-DF94-4682-A7D8-57A52620B86F}" -Value "%USERPROFILE%\Pictures\Screenshots" -Type ExpandString -Force -ErrorAction SilentlyContinue
          
          reg unload "HKU\DefaultUser" | Out-Null

          $StartupFolder = "C:\ProgramData\Microsoft\Windows\Start Menu\Programs\Startup"
          "powershell.exe -ExecutionPolicy Bypass -WindowStyle Hidden -File `"C:\Users\Public\SetWallpaper.ps1`"" | Out-File "$StartupFolder\ApplyWall.bat" -Encoding ascii
          
          Write-Host "Installation and Shortcuts Complete."

      - name: Setup Cloud Backup & Restore Session
        env:
          GDRIVE_CONF: ${{ secrets.GDRIVE_CONF }}
          MEGA_USER: ${{ secrets.MEGA_USER }}
          MEGA_PASS: ${{ secrets.MEGA_PASS }}
        shell: powershell
        run: |
          # --- Detect which backup provider to use ---
          $BackupRemote = "none"

          if ($env:GDRIVE_CONF) {
              Write-Host "Google Drive config found. Setting up rclone..."
              # Download rclone for Windows
              Invoke-WebRequest -Uri "https://downloads.rclone.org/rclone-current-windows-amd64.zip" -OutFile "rclone.zip"
              Expand-Archive -Path "rclone.zip" -DestinationPath "C:\rclone" -Force
              $rcloneExe = (Get-ChildItem -Path "C:\rclone" -Recurse -Filter "rclone.exe")[0].FullName
              Copy-Item $rcloneExe "C:\Windows\System32\rclone.exe" -Force

              # Write rclone config
              $rcloneConfigDir = "C:\Users\runneradmin\AppData\Roaming\rclone"
              New-Item -ItemType Directory -Force -Path $rcloneConfigDir | Out-Null
              $env:GDRIVE_CONF | Out-File -FilePath "$rcloneConfigDir\rclone.conf" -Encoding UTF8

              $BackupRemote = "gdrive"
          } elseif ($env:MEGA_USER -and $env:MEGA_PASS) {
              Write-Host "MEGA credentials found. Setting up rclone..."
              Invoke-WebRequest -Uri "https://downloads.rclone.org/rclone-current-windows-amd64.zip" -OutFile "rclone.zip"
              Expand-Archive -Path "rclone.zip" -DestinationPath "C:\rclone" -Force
              $rcloneExe = (Get-ChildItem -Path "C:\rclone" -Recurse -Filter "rclone.exe")[0].FullName
              Copy-Item $rcloneExe "C:\Windows\System32\rclone.exe" -Force

              # Create MEGA config
              $rcloneConfigDir = "C:\Users\runneradmin\AppData\Roaming\rclone"
              New-Item -ItemType Directory -Force -Path $rcloneConfigDir | Out-Null
              
              # Tell rclone to obscure the plain-text password
              $obscuredPass = (rclone obscure $env:MEGA_PASS).Trim()
              
              $megaConf = "[mega]`ntype = mega`nuser = $($env:MEGA_USER)`npass = $obscuredPass"
              $megaConf | Out-File -FilePath "$rcloneConfigDir\rclone.conf" -Encoding UTF8

              $BackupRemote = "mega"
          } else {
              Write-Host "No backup credentials found. Skipping backup restore."
          }

          # Save which remote to use for later steps
          echo "BACKUP_REMOTE=$BackupRemote" >> $env:GITHUB_ENV

          if ($BackupRemote -ne "none") {
              Write-Host "Ensuring remote directories exist on $BackupRemote..."
              rclone mkdir "${BackupRemote}:winrdp-backup/Mozilla" 2>$null
              rclone mkdir "${BackupRemote}:winrdp-backup/ChromeUserData" 2>$null
              rclone mkdir "${BackupRemote}:winrdp-backup/BraveUserData" 2>$null
              rclone mkdir "${BackupRemote}:winrdp-backup/EdgeUserData" 2>$null
              rclone mkdir "${BackupRemote}:winrdp-backup/SavedFiles" 2>$null

              Write-Host "Restoring browser profiles and SavedFiles from $BackupRemote..."

              # Define paths
              $UserProfile = "C:\Users\RDP"

              # Firefox
              $FFDest = "$UserProfile\AppData\Roaming\Mozilla"
              New-Item -ItemType Directory -Force -Path $FFDest | Out-Null
              rclone copy "${BackupRemote}:winrdp-backup/Mozilla" $FFDest --exclude ".cache/**" | Out-Null

              # Chrome
              $ChromeDest = "$UserProfile\AppData\Local\Google\Chrome\User Data"
              New-Item -ItemType Directory -Force -Path $ChromeDest | Out-Null
              rclone copy "${BackupRemote}:winrdp-backup/ChromeUserData" $ChromeDest --exclude "Cache/**" --exclude "Code Cache/**" | Out-Null

              # Brave
              $BraveDest = "$UserProfile\AppData\Local\BraveSoftware\Brave-Browser\User Data"
              New-Item -ItemType Directory -Force -Path $BraveDest | Out-Null
              rclone copy "${BackupRemote}:winrdp-backup/BraveUserData" $BraveDest --exclude "Cache/**" --exclude "Code Cache/**" | Out-Null

              # Edge
              $EdgeDest = "$UserProfile\AppData\Local\Microsoft\Edge\User Data"
              New-Item -ItemType Directory -Force -Path $EdgeDest | Out-Null
              rclone copy "${BackupRemote}:winrdp-backup/EdgeUserData" $EdgeDest --exclude "Cache/**" --exclude "Code Cache/**" | Out-Null

              # SavedFiles folder
              $SavedFilesDest = "C:\Users\Public\Desktop\SavedFiles"
              New-Item -ItemType Directory -Force -Path $SavedFilesDest | Out-Null
              rclone copy "${BackupRemote}:winrdp-backup/SavedFiles" $SavedFilesDest | Out-Null

              Write-Host "Restore complete!"
          }

          # Always create the SavedFiles folder on desktop
          New-Item -ItemType Directory -Force -Path "C:\Users\Public\Desktop\SavedFiles" | Out-Null
          Write-Host "SavedFiles folder created on Desktop."

          # Fix permissions so the RDP user has full write access to all restored files.
          # Without this, files created by runneradmin (rclone) are read-only for the RDP user.
          Write-Host "Granting RDP user full control over SavedFiles..."
          icacls "C:\Users\Public\Desktop\SavedFiles" /grant "RDP:(OI)(CI)(F)" /T /C | Out-Null
          Write-Host "Permissions fixed - RDP user can now read and write all files."

      - name: Start Cloudflare Tunnel & Maintain Connection
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          if (-not $env:CF_TOKEN) {
              Write-Error "Error: Secret 'CF_TOKEN' is missing. Add your Cloudflare token to Secrets."
              exit 1
          }

          Write-Host "Downloading Cloudflared for Windows..."
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          
          Write-Host "Installing and Starting Cloudflare Tunnel as a service..."
          .\cloudflared.exe service install $env:CF_TOKEN
          
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Username: RDP"
          Write-Host "Password: (Hidden - Check your Secrets)"
          Write-Host "Connect via the public hostname you configured in your Cloudflare Zero Trust dashboard."
          Write-Host "==================`n"
          
          # Timer setup: Run for exactly 345 minutes (5 hours 45 minutes)
          $endTime = (Get-Date).AddMinutes(345)
          Write-Host "Runner will stay active until $endTime"

          while ((Get-Date) -lt $endTime) {
              Write-Host "[$(Get-Date)] RDP Active via Cloudflare - Cancel workflow to terminate early"
              Start-Sleep -Seconds 60
          }
          
          Write-Host "Time limit reached (5 hours 45 mins). Proceeding to shutdown & backup..."

      - name: Final Cloud Backup
        if: always()
        env:
          BACKUP_REMOTE: ${{ env.BACKUP_REMOTE }}
        shell: powershell
        run: |
          if ($env:BACKUP_REMOTE -ne "none" -and $env:BACKUP_REMOTE) {
              Write-Host "Saving active desktop wallpaper..."
              Copy-Item "C:\Users\RDP\AppData\Roaming\Microsoft\Windows\Themes\TranscodedWallpaper" "C:\Users\Public\Desktop\SavedFiles\MyWallpaper.jpg" -Force -ErrorAction SilentlyContinue

              Write-Host "Performing final backup to $($env:BACKUP_REMOTE)..."
              $UserProfile = "C:\Users\RDP"
              rclone sync "$UserProfile\AppData\Roaming\Mozilla" "$($env:BACKUP_REMOTE):winrdp-backup/Mozilla" --exclude ".cache/**"
              rclone sync "$UserProfile\AppData\Local\Google\Chrome\User Data" "$($env:BACKUP_REMOTE):winrdp-backup/ChromeUserData" --exclude "Cache/**" --exclude "Code Cache/**"
              rclone sync "$UserProfile\AppData\Local\BraveSoftware\Brave-Browser\User Data" "$($env:BACKUP_REMOTE):winrdp-backup/BraveUserData" --exclude "Cache/**" --exclude "Code Cache/**"
              rclone sync "$UserProfile\AppData\Local\Microsoft\Edge\User Data" "$($env:BACKUP_REMOTE):winrdp-backup/EdgeUserData" --exclude "Cache/**" --exclude "Code Cache/**"
              rclone sync "C:\Users\Public\Desktop\SavedFiles" "$($env:BACKUP_REMOTE):winrdp-backup/SavedFiles"
              Write-Host "Final backup complete."
          } else {
              Write-Host "No backup remote configured. Skipping final backup."
          }

      - name: ðŸ”„ Auto-Restart Server
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Triggering next workflow run to restart the server..."
          gh workflow run rdp_workflow.yml --repo ${{ github.repository }} --ref ${{ github.ref_name }}
          Write-Host "âœ… Restart triggered successfully!"
