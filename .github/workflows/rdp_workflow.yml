name: RDP (Zrok Stable - Fast Boot)

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Core RDP Settings
        run: |
          # --- AUDIO & SESSION FIXES ---
          Set-Service -Name Audiosrv -StartupType Automatic
          sc failure Audiosrv reset=86400 actions=restart/5000/restart/10000/restart/30000
          Start-Service -Name Audiosrv
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableAudioCapture" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxDisconnectionTime" -Value 0 -Force
          
          # Enable clipboard sharing
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableClip" -Value 0 -Force
          
          # Enable Remote Desktop (disable NLA for log-based interaction)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          
          # Enable auto-reconnect on disconnect
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fEnableAutoReconnect" -Value 1 -Force
          
          # Firewall
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          
          # Auto-restart RDP service if it crashes
          sc failure TermService reset=86400 actions=restart/5000/restart/10000/restart/30000
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        env:
          MY_SECRET_PASS: ${{ secrets.PASS }}
        run: |
          if (-not $env:MY_SECRET_PASS) {
            Write-Error "Secret 'PASS' is missing. Add it in Repository Settings."
            exit 1
          }
          $securePass = ConvertTo-SecureString $env:MY_SECRET_PASS -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_CREDS=User: RDP | Password: (Hidden)" >> $env:GITHUB_ENV

      - name: Optimize System (Fast)
        run: |
          # High Performance power plan
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          
          # Disable Windows Automatic Updates (prevents background lag)
          New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" -Force | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" -Name "NoAutoUpdate" -Value 1 -Type DWord -Force
          
          Write-Host "Core system optimization complete."

      - name: Start Zrok & Maintain Connection
        env:
          ZROK_TOKEN: ${{ secrets.ZROK_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if (-not $env:ZROK_TOKEN) {
            Write-Error "Secret 'ZROK_TOKEN' is missing. Add it in Repository Settings."
            exit 1
          }

          # --- Download & prepare zrok using authenticated CLI ---
          $zrokDir = "$env:TEMP\zrok"
          New-Item -ItemType Directory -Force -Path $zrokDir | Out-Null
          
          Write-Host "Fetching latest zrok release..."
          
          # OpenZiti occasionally packages as .tar.gz instead of .zip. This targets both.
          gh release download --repo openziti/zrok --pattern "*windows_amd64.zip" --pattern "*windows_amd64.tar.gz" --dir $zrokDir
          
          $zrokArchive = Get-ChildItem -Path $zrokDir -Filter "*windows_amd64*" | Select-Object -First 1
          if (-not $zrokArchive) {
            Write-Error "Failed to download zrok zip/tar file."
            exit 1
          }
          
          # Extract dynamically based on format
          if ($zrokArchive.Name.EndsWith(".zip")) {
            Expand-Archive $zrokArchive.FullName -DestinationPath $zrokDir -Force
          } else {
            tar -xzf $zrokArchive.FullName -C $zrokDir
          }
          
          # Dynamically locate the executable inside the extracted folders
          $zrokExe = (Get-ChildItem -Path $zrokDir -Filter "zrok.exe" -Recurse | Select-Object -First 1).FullName
          
          if (-not $zrokExe) {
            Write-Error "Failed to find zrok.exe after extraction."
            exit 1
          }

          # --- Enable zrok ---
          & $zrokExe enable $env:ZROK_TOKEN
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to enable zrok. Check your ZROK_TOKEN."
            exit 1
          }

          # --- Helper: wait for zrok public address ---
          function Get-ZrokAddress($logFile, $timeoutSec = 90) {
            $start = Get-Date
            while ((Get-Date) - $start -lt [TimeSpan]::FromSeconds($timeoutSec)) {
              if (Test-Path $logFile) {
                # Look for the public tcp/udp endpoint in the logs
                $m = (Get-Content $logFile -Tail 20) | Select-String 'tcp://([a-zA-Z0-9\.\-_]+:\d+)'
                if ($m) {
                  return $m.Matches.Groups[1].Value.Trim()
                }
              }
              Start-Sleep -Seconds 1
            }
            return $null
          }

          # --- Main retry loop with auto-restart ---
          $maxRetries = 5
          $delay = 10
          
          for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
            Write-Host "`n=== Zrok attempt $attempt/$maxRetries ==="
            $logFile = "$env:TEMP\zrok_$attempt.log"
            
            # Use 'share public' with tcp backend mode so mobile devices can access it directly
            $proc = Start-Process -FilePath $zrokExe -ArgumentList "share public localhost:3389 --backend-mode tcp" `
              -NoNewWindow -RedirectStandardOutput $logFile -RedirectStandardError $logFile -PassThru
              
            $address = Get-ZrokAddress -logFile $logFile -timeoutSec 90
            
            if ($address) {
              Write-Host "`n=== RDP ACCESS ==="
              Write-Host "Address for Mobile App: $address"
              Write-Host "Username: RDP"
              Write-Host "Password: (Hidden)"
              Write-Host "==================`n"
              
              $delay = 10 # reset backoff
              
              # Watchdog: keep zrok alive, restart if it crashes
              while ($true) {
                Start-Sleep -Seconds 30
                if ($proc.HasExited) {
                  Write-Host "Zrok exited (code $($proc.ExitCode)). Restarting..."
                  break
                }
                Write-Host "[$(Get-Date -Format 'HH:mm:ss')] RDP Active via Zrok Public TCP"
              }
            } else {
              Write-Warning "Failed to get public address (attempt $attempt)"
              if ($proc -and !$proc.HasExited) {
                $proc.Kill()
              }
              Write-Host "Retrying in ${delay}s..."
              Start-Sleep -Seconds $delay
              $delay = [Math]::Min($delay * 2, 120) # exponential backoff
            }
          }
          
          Write-Error "All $maxRetries attempts failed."

      # 9. Auto-Restart Workflow
      - name: 🔄 Auto-Restart Server
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering next workflow run to restart the server..."
          # Adding --repo bypasses the need for a .git checkout folder
          gh workflow run "${{ github.workflow }}" --repo ${{ github.repository }} --ref ${{ github.ref_name }}
