name: Windows RDP (Cloudflare + Apps + Cloud Backup)

on:
  workflow_dispatch:

# REQUIRED: Grants the GitHub token permission to trigger the next workflow run
permissions:
  actions: write
  contents: read

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          # --- SET TIMEZONE TO IST ---
          Set-TimeZone -Id "India Standard Time"

          # --- AUDIO & SESSION FIXES START HERE ---
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableAudioCapture" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxDisconnectionTime" -Value 0 -Force
          # --- FIXES END HERE ---
          
          # --- FIX TEMPORARY PAGING FILE WARNING POPUP ---
          Remove-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management" -Name "TempPageFile" -ErrorAction SilentlyContinue

          # Enable Remote Desktop and disable Network Level Authentication
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                               -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                               -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                               -Name "SecurityLayer" -Value 0 -Force

          # Remove existing rule, then allow incoming RDP connections
          netsh advfirewall firewall delete rule name="RDP-Tunnel"
          netsh advfirewall firewall add rule name="RDP-Tunnel" `
            dir=in action=allow protocol=TCP localport=3389

          # Restart Remote Desktop service
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        env:
          MY_SECRET_PASS: ${{ secrets.PASS }}
        run: |
          if (-not $env:MY_SECRET_PASS) {
              Write-Error "Error: Secret 'PASS' is empty or missing. Please add it in Repository Settings."
              exit 1
          }

          $password = $env:MY_SECRET_PASS
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          
          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Apps & Fix Shortcuts
        run: |
          Write-Host "Installing Apps..."
          
          # 1. Install all apps via Chocolatey in a single batch to save initialization time (Added 7zip)
          choco install vb-cable winrar googlechrome brave ffmpeg captura irfanview irfanviewplugins vlc 7zip -y --no-progress --ignore-checksums
          
          # 2. FIX IMAGE VIEWER FOR ALL USERS (Force IrfanView instead of Paint)
          $IrfanPath = "C:\Program Files\IrfanView\i_view64.exe"
          cmd.exe /c "assoc .png=IrfanView.Image"
          cmd.exe /c "assoc .jpg=IrfanView.Image"
          cmd.exe /c "assoc .jpeg=IrfanView.Image"
          cmd.exe /c "assoc .webp=IrfanView.Image"
          cmd.exe /c "ftype IrfanView.Image=`"$IrfanPath`" `"%1`""

          # 3. FIX BRAVE: Move to Public Folder
          $BraveAdmin = "C:\Users\runneradmin\AppData\Local\BraveSoftware"
          if (Test-Path $BraveAdmin) {
              Copy-Item -Path $BraveAdmin -Destination "C:\" -Recurse -Force
          }
          
          # 4. FIX CAPTURA: Find and Move to Public Folder
          $CapLoc1 = "C:\Users\runneradmin\AppData\Local\Captura"
          $CapLoc2 = "C:\ProgramData\chocolatey\lib\captura\tools"
          
          if (Test-Path $CapLoc1) {
              Copy-Item -Path $CapLoc1 -Destination "C:\" -Recurse -Force
              Rename-Item -Path "C:\Captura" -NewName "Captura_App" -ErrorAction SilentlyContinue
              Rename-Item -Path "C:\Captura_App" -NewName "Captura"
          }
          elseif (Test-Path $CapLoc2) {
              Copy-Item -Path $CapLoc2 -Destination "C:\Captura" -Recurse -Force
          }
          
          # 5. Create Desktop Shortcuts & The Instant Restart Button
          $WshShell = New-Object -comObject WScript.Shell
          
          $BraveLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Brave.lnk")
          $BraveLnk.TargetPath = "C:\BraveSoftware\Brave-Browser\Application\brave.exe"
          $BraveLnk.Save()
          
          $CapturaLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\Captura.lnk")
          $CapturaLnk.TargetPath = "C:\Captura\Captura.exe"
          $CapturaLnk.WorkingDirectory = "C:\Captura"
          $CapturaLnk.Save()

          $RarLnk = $WshShell.CreateShortcut("C:\Users\Public\Desktop\WinRAR.lnk")
          if (Test-Path "C:\Program Files\WinRAR\WinRAR.exe") {
              $RarLnk.TargetPath = "C:\Program Files\WinRAR\WinRAR.exe"
          } else {
              $RarLnk.TargetPath = "C:\Program Files (x86)\WinRAR\WinRAR.exe"
          }
          $RarLnk.Save()

          # --- INSTANT RESTART BUTTON (Self-Elevating Process Killer) ---
          $RestartBat = @'
          @echo off
          net session >nul 2>&1
          if %errorLevel% NEQ 0 (
              powershell -Command "Start-Process '%~f0' -Verb RunAs"
              exit /b
          )
          echo =======================================================
          echo Initiating Instant Backup and Server Restart...
          echo =======================================================
          echo 1. Closing browsers to free up memory...
          taskkill /F /IM chrome.exe >nul 2>&1
          taskkill /F /IM brave.exe >nul 2>&1
          echo 2. Triggering workflow backup sequence...
          taskkill /F /IM WorkflowTimer.exe >nul 2>&1
          echo The server will now begin backing up your files and restart.
          echo You can safely close your Remote Desktop app now!
          timeout /t 5 >nul
          '@
          $RestartBat | Out-File "C:\Users\Public\Desktop\Instant-Restart.bat" -Encoding ascii

          # 6. Create Auto-Startup Script for RDP User
          Write-Host "Setting up User Startup script (Dark Mode, Wallpaper)..."
          $ScriptPath = "C:\Users\Public\UserStartup.ps1"
          
          @'
          # --- FORCE DARK MODE FOR RDP USER ---
          $ThemePath = "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize"
          if (-not (Test-Path $ThemePath)) { New-Item -Path $ThemePath -Force | Out-Null }
          Set-ItemProperty -Path $ThemePath -Name "AppsUseLightTheme" -Value 0 -Type DWord -Force
          Set-ItemProperty -Path $ThemePath -Name "SystemUsesLightTheme" -Value 0 -Type DWord -Force

          # Restart Explorer so the Taskbar turns dark instantly
          Stop-Process -Name explorer -Force

          # --- RESTORE WALLPAPER ---
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "JPEGImportQuality" -Value 100 -Type DWord -Force -ErrorAction SilentlyContinue
          $imgPath = "C:\Users\Public\Desktop\SavedFiles\MyWallpaper.jpg"
          if (Test-Path $imgPath) {
              Add-Type -TypeDefinition "using System; using System.Runtime.InteropServices; public class W { [DllImport(\"user32.dll\")] public static extern int SystemParametersInfo(int a, int b, string c, int d); }"
              [W]::SystemParametersInfo(20, 0, $imgPath, 3)
          }
          '@ | Out-File $ScriptPath -Encoding utf8
          
          # Launch the script silently when user logs in
          $StartupFolder = "C:\ProgramData\Microsoft\Windows\Start Menu\Programs\Startup"
          "powershell.exe -ExecutionPolicy Bypass -WindowStyle Hidden -File `"$ScriptPath`"" | Out-File "$StartupFolder\UserStartup.bat" -Encoding ascii
          
          Write-Host "Installation Complete."

      - name: Setup Cloud Backup & Restore Session
        env:
          GDRIVE_CONF: ${{ secrets.GDRIVE_CONF }}
          MEGA_USER: ${{ secrets.MEGA_USER }}
          MEGA_PASS: ${{ secrets.MEGA_PASS }}
        shell: powershell
        run: |
          # --- Detect which backup provider to use ---
          $BackupRemote = "none"

          if ($env:GDRIVE_CONF) {
              Write-Host "Google Drive config found. Setting up rclone..."
              # Download rclone for Windows
              Invoke-WebRequest -Uri "https://downloads.rclone.org/rclone-current-windows-amd64.zip" -OutFile "rclone.zip"
              Expand-Archive -Path "rclone.zip" -DestinationPath "C:\rclone" -Force
              $rcloneExe = (Get-ChildItem -Path "C:\rclone" -Recurse -Filter "rclone.exe")[0].FullName
              Copy-Item $rcloneExe "C:\Windows\System32\rclone.exe" -Force

              # Write rclone config
              $rcloneConfigDir = "C:\Users\runneradmin\AppData\Roaming\rclone"
              New-Item -ItemType Directory -Force -Path $rcloneConfigDir | Out-Null
              $env:GDRIVE_CONF | Out-File -FilePath "$rcloneConfigDir\rclone.conf" -Encoding UTF8

              $BackupRemote = "gdrive"
          } elseif ($env:MEGA_USER -and $env:MEGA_PASS) {
              Write-Host "MEGA credentials found. Setting up rclone..."
              Invoke-WebRequest -Uri "https://downloads.rclone.org/rclone-current-windows-amd64.zip" -OutFile "rclone.zip"
              Expand-Archive -Path "rclone.zip" -DestinationPath "C:\rclone" -Force
              $rcloneExe = (Get-ChildItem -Path "C:\rclone" -Recurse -Filter "rclone.exe")[0].FullName
              Copy-Item $rcloneExe "C:\Windows\System32\rclone.exe" -Force

              # Create MEGA config
              $rcloneConfigDir = "C:\Users\runneradmin\AppData\Roaming\rclone"
              New-Item -ItemType Directory -Force -Path $rcloneConfigDir | Out-Null
              
              # Tell rclone to obscure the plain-text password
              $obscuredPass = (rclone obscure $env:MEGA_PASS).Trim()
              
              $megaConf = "[mega]`ntype = mega`nuser = $($env:MEGA_USER)`npass = $obscuredPass"
              $megaConf | Out-File -FilePath "$rcloneConfigDir\rclone.conf" -Encoding UTF8

              $BackupRemote = "mega"
          } else {
              Write-Host "No backup credentials found. Skipping backup restore."
          }

          # Save which remote to use for later steps
          echo "BACKUP_REMOTE=$BackupRemote" >> $env:GITHUB_ENV

          if ($BackupRemote -ne "none") {
              # FIX: Copy the rclone configuration to a Public directory so the RDP user can access it
              Copy-Item "C:\Users\runneradmin\AppData\Roaming\rclone\rclone.conf" "C:\Users\Public\rclone.conf" -Force

              Write-Host "Ensuring remote directories exist on $BackupRemote..."
              rclone mkdir "${BackupRemote}:winrdp-backup/Mozilla" 2>&1 | Out-Null
              rclone mkdir "${BackupRemote}:winrdp-backup/ChromeUserData" 2>&1 | Out-Null
              rclone mkdir "${BackupRemote}:winrdp-backup/BraveUserData" 2>&1 | Out-Null
              rclone mkdir "${BackupRemote}:winrdp-backup/EdgeUserData" 2>&1 | Out-Null

              Write-Host "Restoring browser profiles and SavedFiles from $BackupRemote..."

              # Define paths
              $UserProfile = "C:\Users\RDP"

              # Firefox
              $FFDest = "$UserProfile\AppData\Roaming\Mozilla"
              New-Item -ItemType Directory -Force -Path $FFDest | Out-Null
              rclone copy "${BackupRemote}:winrdp-backup/Mozilla" $FFDest --exclude ".cache/**" --transfers 16 --checkers 16 2>&1 | Out-Null

              # Chrome
              $ChromeDest = "$UserProfile\AppData\Local\Google\Chrome\User Data"
              New-Item -ItemType Directory -Force -Path $ChromeDest | Out-Null
              rclone copy "${BackupRemote}:winrdp-backup/ChromeUserData" $ChromeDest --exclude "Cache/**" --exclude "Code Cache/**" --transfers 16 --checkers 16 2>&1 | Out-Null

              # Brave
              $BraveDest = "$UserProfile\AppData\Local\BraveSoftware\Brave-Browser\User Data"
              New-Item -ItemType Directory -Force -Path $BraveDest | Out-Null
              rclone copy "${BackupRemote}:winrdp-backup/BraveUserData" $BraveDest --exclude "Cache/**" --exclude "Code Cache/**" --transfers 16 --checkers 16 2>&1 | Out-Null

              # Edge
              $EdgeDest = "$UserProfile\AppData\Local\Microsoft\Edge\User Data"
              New-Item -ItemType Directory -Force -Path $EdgeDest | Out-Null
              rclone copy "${BackupRemote}:winrdp-backup/EdgeUserData" $EdgeDest --exclude "Cache/**" --exclude "Code Cache/**" --transfers 16 --checkers 16 2>&1 | Out-Null

              # SavedFiles folder (Archive logic)
              $SavedFilesDest = "C:\Users\Public\Desktop\SavedFiles"
              New-Item -ItemType Directory -Force -Path "C:\TempZips" | Out-Null
              rclone copy "${BackupRemote}:winrdp-backup/SavedFiles.zip" "C:\TempZips" 2>&1 | Out-Null
              
              if (Test-Path "C:\TempZips\SavedFiles.zip") {
                  Write-Host "Extracting zipped SavedFiles archive..."
                  New-Item -ItemType Directory -Force -Path $SavedFilesDest | Out-Null
                  7z x "C:\TempZips\SavedFiles.zip" -o"$SavedFilesDest" -y | Out-Null
              } else {
                  Write-Host "No archive found. Restoring unzipped legacy SavedFiles..."
                  New-Item -ItemType Directory -Force -Path $SavedFilesDest | Out-Null
                  rclone copy "${BackupRemote}:winrdp-backup/SavedFiles" $SavedFilesDest --transfers 16 --checkers 16 2>&1 | Out-Null
              }

              Write-Host "Restore complete!"

              # --- CREATE MANUAL SYNC SCRIPT ON DESKTOP ---
              Write-Host "Creating Manual Sync script on Desktop..."
              $SyncBatPath = "C:\Users\Public\Desktop\Sync-Now.bat"
              $SyncBatContent = @"
          @echo off
          title Manual Cloud Backup
          echo =======================================================
          echo Initiating Manual Cloud Backup...
          echo =======================================================
          echo.
          echo Saving active desktop wallpaper...
          copy /Y "C:\Users\RDP\AppData\Roaming\Microsoft\Windows\Themes\TranscodedWallpaper" "C:\Users\Public\Desktop\SavedFiles\MyWallpaper.jpg" >nul 2>&1
          echo.
          echo Syncing Mozilla Firefox...
          if exist "C:\Users\RDP\AppData\Roaming\Mozilla" ( rclone sync "C:\Users\RDP\AppData\Roaming\Mozilla" "$($BackupRemote):winrdp-backup/Mozilla" --exclude ".cache/**" -P --config "C:\Users\Public\rclone.conf" )
          echo.
          echo Syncing Google Chrome...
          if exist "C:\Users\RDP\AppData\Local\Google\Chrome\User Data" ( rclone sync "C:\Users\RDP\AppData\Local\Google\Chrome\User Data" "$($BackupRemote):winrdp-backup/ChromeUserData" --exclude "Cache/**" --exclude "Code Cache/**" -P --config "C:\Users\Public\rclone.conf" )
          echo.
          echo Syncing Brave Browser...
          if exist "C:\Users\RDP\AppData\Local\BraveSoftware\Brave-Browser\User Data" ( rclone sync "C:\Users\RDP\AppData\Local\BraveSoftware\Brave-Browser\User Data" "$($BackupRemote):winrdp-backup/BraveUserData" --exclude "Cache/**" --exclude "Code Cache/**" -P --config "C:\Users\Public\rclone.conf" )
          echo.
          echo Syncing Microsoft Edge...
          if exist "C:\Users\RDP\AppData\Local\Microsoft\Edge\User Data" ( rclone sync "C:\Users\RDP\AppData\Local\Microsoft\Edge\User Data" "$($BackupRemote):winrdp-backup/EdgeUserData" --exclude "Cache/**" --exclude "Code Cache/**" -P --config "C:\Users\Public\rclone.conf" )
          echo.
          
          echo Packaging SavedFiles into an Archive...
          if not exist "C:\TempZips" mkdir "C:\TempZips"
          if exist "C:\TempZips\SavedFiles.zip" del /f /q "C:\TempZips\SavedFiles.zip"
          7z a -tzip -mx0 -ssw "C:\TempZips\SavedFiles.zip" "C:\Users\Public\Desktop\SavedFiles\*" >nul
          echo Syncing SavedFiles Archive...
          rclone copy "C:\TempZips\SavedFiles.zip" "$($BackupRemote):winrdp-backup/" -P --config "C:\Users\Public\rclone.conf"
          
          echo.
          echo =======================================================
          echo [x] SYNC COMPLETELY DONE! You can close this window.
          echo =======================================================
          pause
          "@
              $SyncBatContent | Out-File $SyncBatPath -Encoding utf8
          }

          # Always create the SavedFiles folder on desktop
          New-Item -ItemType Directory -Force -Path "C:\Users\Public\Desktop\SavedFiles" | Out-Null
          Write-Host "SavedFiles folder created on Desktop."

          # Fix permissions so the RDP user has full write access to all restored files.
          # Without this, files created by runneradmin (rclone) are read-only for the RDP user.
          Write-Host "Granting RDP user full control over SavedFiles..."
          icacls "C:\Users\Public\Desktop\SavedFiles" /grant "RDP:(OI)(CI)(F)" /T /C | Out-Null
          Write-Host "Permissions fixed - RDP user can now read and write all files."

      - name: Start Cloudflare Tunnel & Maintain Connection
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          if (-not $env:CF_TOKEN) {
              Write-Error "Error: Secret 'CF_TOKEN' is missing. Add your Cloudflare token to Secrets."
              exit 1
          }

          Write-Host "Downloading Cloudflared for Windows..."
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          
          Write-Host "Installing and Starting Cloudflare Tunnel as a service..."
          .\cloudflared.exe service install $env:CF_TOKEN
          
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Username: RDP"
          Write-Host "Password: (Hidden - Check your Secrets)"
          Write-Host "Connect via the public hostname you configured in your Cloudflare Zero Trust dashboard."
          Write-Host "==================`n"
          
          # --- ZERO-CPU PROCESS ANCHOR METHOD ---
          Write-Host "Starting 330-minute zero-CPU tether..."
          
          # Copy the built-in timeout utility to create a unique process name
          Copy-Item "C:\Windows\System32\timeout.exe" "C:\Windows\System32\WorkflowTimer.exe" -Force
          
          # Start the hidden 330-minute (19800 seconds) timer process
          Start-Process -FilePath "C:\Windows\System32\WorkflowTimer.exe" -ArgumentList "/t 19800 /nobreak" -WindowStyle Hidden
          
          Write-Host "[$(Get-Date)] RDP Active. Run 'Instant-Restart.bat' on your desktop to trigger backup & restart instantly."
          
          # Put the workflow into a completely zero-CPU hibernation until the anchor dies
          Wait-Process -Name "WorkflowTimer" -ErrorAction SilentlyContinue
          
          Write-Host "Time limit reached or manually interrupted via Instant-Restart.bat. Proceeding to shutdown & backup..."

      - name: Final Cloud Backup
        if: always()
        env:
          BACKUP_REMOTE: ${{ env.BACKUP_REMOTE }}
        shell: powershell
        run: |
          if ($env:BACKUP_REMOTE -ne "none" -and $env:BACKUP_REMOTE) {
              Write-Host "Saving active desktop wallpaper..."
              Copy-Item "C:\Users\RDP\AppData\Roaming\Microsoft\Windows\Themes\TranscodedWallpaper" "C:\Users\Public\Desktop\SavedFiles\MyWallpaper.jpg" -Force -ErrorAction SilentlyContinue

              Write-Host "Performing final backup to $($env:BACKUP_REMOTE)..."
              $UserProfile = "C:\Users\RDP"
              
              if (Test-Path "$UserProfile\AppData\Roaming\Mozilla") { rclone sync "$UserProfile\AppData\Roaming\Mozilla" "$($env:BACKUP_REMOTE):winrdp-backup/Mozilla" --exclude ".cache/**" 2>&1 | Out-Null }
              if (Test-Path "$UserProfile\AppData\Local\Google\Chrome\User Data") { rclone sync "$UserProfile\AppData\Local\Google\Chrome\User Data" "$($env:BACKUP_REMOTE):winrdp-backup/ChromeUserData" --exclude "Cache/**" --exclude "Code Cache/**" 2>&1 | Out-Null }
              if (Test-Path "$UserProfile\AppData\Local\BraveSoftware\Brave-Browser\User Data") { rclone sync "$UserProfile\AppData\Local\BraveSoftware\Brave-Browser\User Data" "$($env:BACKUP_REMOTE):winrdp-backup/BraveUserData" --exclude "Cache/**" --exclude "Code Cache/**" 2>&1 | Out-Null }
              if (Test-Path "$UserProfile\AppData\Local\Microsoft\Edge\User Data") { rclone sync "$UserProfile\AppData\Local\Microsoft\Edge\User Data" "$($env:BACKUP_REMOTE):winrdp-backup/EdgeUserData" --exclude "Cache/**" --exclude "Code Cache/**" 2>&1 | Out-Null }
              
              Write-Host "Archiving SavedFiles for fast upload..."
              $TempZips = "C:\TempZips"
              if (-not (Test-Path $TempZips)) { New-Item -ItemType Directory -Force -Path $TempZips | Out-Null }
              if (Test-Path "$TempZips\SavedFiles.zip") { Remove-Item "$TempZips\SavedFiles.zip" -Force }
              if (Test-Path "C:\Users\Public\Desktop\SavedFiles") { 
                  7z a -tzip -mx0 -ssw "$TempZips\SavedFiles.zip" "C:\Users\Public\Desktop\SavedFiles\*" | Out-Null 
                  rclone copy "$TempZips\SavedFiles.zip" "$($env:BACKUP_REMOTE):winrdp-backup/" 2>&1 | Out-Null
              }
              
              Write-Host "Final backup complete."
          } else {
              Write-Host "No backup remote configured. Skipping final backup."
          }

      - name: 🔄 Auto-Restart Server
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Triggering next workflow run to restart the server..."
          gh workflow run rdp_workflow.yml --repo ${{ github.repository }} --ref ${{ github.ref_name }}
          Write-Host "✅ Restart triggered successfully!"
